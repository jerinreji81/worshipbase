<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#ffffff"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="WorshipBase Test"/>
<title>WorshipBase Safe Area Test</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --tc:#10374A;--tc-light:#e8f3f7;--tc-mid:#7ab8cc;
  --bg1:#ffffff;--bg2:#f3f6f8;--bg3:#eaeff2;
  --txt1:#0d1e26;--txt2:#3e5a68;--txt3:#8eaab8;
  --bdr:rgba(16,55,74,.08);--bdr2:rgba(16,55,74,.15);
  --shadow-sm:0 1px 4px rgba(16,55,74,.10);
  --shadow-md:0 4px 16px rgba(16,55,74,.13);
  --rad-pill:999px;
  --tab-h:52px;
  --sat:0px;--sab:0px;
}
html,body{
  height:100vh;
  overflow:hidden;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
  background:var(--bg1);
  color:var(--txt1);
  font-size:16px;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}
.app{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  background:var(--bg1);
}
.header{
  background:var(--tc);
  color:#fff;
  padding:calc(var(--sat) + 14px) 18px 14px;
}
.header-title{font-size:17px;font-weight:800;letter-spacing:-.3px;line-height:1;}
.header-sub{font-size:11px;color:rgba(255,255,255,.55);margin-top:4px;}
.content{
  flex:1;
  min-height:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(180deg,var(--bg1),var(--bg2));
  text-align:center;
  padding:24px;
}
.card{
  width:min(420px,100%);
  background:var(--bg1);
  border:1px solid var(--bdr);
  border-radius:18px;
  box-shadow:var(--shadow-md);
  padding:22px 18px;
}
.card h1{font-size:19px;margin-bottom:8px;}
.card p{font-size:14px;line-height:1.5;color:var(--txt2);}
.metrics{
  margin-top:14px;
  display:grid;
  gap:8px;
}
.metric{
  display:flex;
  justify-content:space-between;
  gap:12px;
  padding:10px 12px;
  border-radius:12px;
  background:var(--bg2);
  font-size:13px;
}
.metric strong{color:var(--tc);}
.tab-bar{
  flex-shrink:0;
  background:var(--bg1);
  border-top:.5px solid var(--bdr);
  display:flex;
  align-items:flex-start;
  height:calc(var(--tab-h) + var(--sab));
  padding-bottom:var(--sab);
}
.tab-btn{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
  height:var(--tab-h);
  border:none;
  background:none;
  color:var(--txt3);
  font-family:inherit;
}
.tab-btn.active{color:var(--tc);}
.tab-lbl{font-size:10px;font-weight:600;letter-spacing:.01em;}
.tab-ico{display:flex;align-items:center;justify-content:center;}
.footer-note{
  position:fixed;
  left:12px;
  right:12px;
  bottom:calc(var(--tab-h) + var(--sab) + 12px);
  font-size:12px;
  color:var(--txt3);
  text-align:center;
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-title">WorshipBase</div>
    <div class="header-sub">Safe area test page</div>
  </div>

  <div class="content">
    <div class="card">
      <h1>Bottom chin test</h1>
      <p>This page keeps only a simple header, blank content area, and the bottom navigation bar so you can see whether the gap is caused by the core layout.</p>
      <div class="metrics">
        <div class="metric"><span>Top safe area</span><strong id="sat-readout">0px</strong></div>
        <div class="metric"><span>Bottom safe area</span><strong id="sab-readout">0px</strong></div>
        <div class="metric"><span>Viewport</span><strong id="vp-readout">0 × 0</strong></div>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active">
      <span class="tab-ico">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h10M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </span>
      <span class="tab-lbl">English</span>
    </button>
    <button class="tab-btn">
      <span class="tab-ico">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 5h16M4 10h7M4 15h13M4 20h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </span>
      <span class="tab-lbl">Malayalam</span>
    </button>
    <button class="tab-btn">
      <span class="tab-ico">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="4" height="4" rx="1" fill="currentColor" opacity=".5"/><rect x="3" y="11" width="4" height="4" rx="1" fill="currentColor" opacity=".75"/><rect x="3" y="17" width="4" height="4" rx="1" fill="currentColor"/><path d="M11 7h10M11 13h8M11 19h9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </span>
      <span class="tab-lbl">Set List</span>
    </button>
    <button class="tab-btn">
      <span class="tab-ico">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.07a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </span>
      <span class="tab-lbl">Settings</span>
    </button>
  </div>
</div>

<script>
/* Exact safe-area probe adapted from your current file */
(function initSafeArea(){
  const root=document.documentElement;
  const probeTop=document.createElement('div');
  probeTop.style.cssText='position:fixed;top:0;left:0;width:1px;height:env(safe-area-inset-top,0px);pointer-events:none;opacity:0;z-index:-1;';
  const probeBot=document.createElement('div');
  probeBot.style.cssText='position:fixed;bottom:0;left:0;width:1px;height:env(safe-area-inset-bottom,0px);pointer-events:none;opacity:0;z-index:-1;';
  root.appendChild(probeTop);
  root.appendChild(probeBot);

  function orientKey(){
    const portrait=(window.matchMedia && window.matchMedia('(orientation: portrait)').matches) ||
      window.innerHeight>=window.innerWidth;
    return portrait?'p':'l';
  }

  function readStoredInset(){
    try{
      return parseFloat(localStorage.getItem('wb_safe_bottom_'+orientKey())||'0')||0;
    }catch(e){ return 0; }
  }

  function storeInset(px){
    try{
      localStorage.setItem('wb_safe_bottom_'+orientKey(), String(px));
    }catch(e){}
  }

  function applyInsets(sat,sab){
    root.style.setProperty('--sat', Math.max(0, sat)+'px');
    root.style.setProperty('--sab', Math.max(0, sab)+'px');
    document.getElementById('sat-readout').textContent = Math.max(0, sat) + 'px';
    document.getElementById('sab-readout').textContent = Math.max(0, sab) + 'px';
    document.getElementById('vp-readout').textContent = window.innerWidth + ' × ' + window.innerHeight;
  }

  function rawMeasure(){
    const sat=Math.round(probeTop.getBoundingClientRect().height||0);
    const sab=Math.round(probeBot.getBoundingClientRect().height||0);
    return {sat,sab};
  }

  function measure(){
    const m=rawMeasure();
    const stored=readStoredInset();
    let sab=m.sab;
    if(sab===0 && stored>0) sab=stored;
    if(sab>stored) storeInset(sab);
    applyInsets(m.sat, Math.max(sab, stored));
  }

  function scheduleMeasure(){
    measure();
    setTimeout(measure, 50);
    setTimeout(measure, 150);
    setTimeout(measure, 350);
    setTimeout(measure, 700);
  }

  scheduleMeasure();
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden) scheduleMeasure(); });
  window.addEventListener('focus',scheduleMeasure,{passive:true});
  window.addEventListener('resize',scheduleMeasure,{passive:true});
  window.addEventListener('orientationchange',()=>setTimeout(scheduleMeasure,120),{passive:true});
  window.addEventListener('pageshow',scheduleMeasure,{passive:true});
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize',scheduleMeasure,{passive:true});
    window.visualViewport.addEventListener('scroll',scheduleMeasure,{passive:true});
  }
})();
</script>
</body>
</html>
